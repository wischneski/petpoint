  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://connect.facebook.net">

  <!-- 3. META TAGS SEO -->
  <title>PetPoint | Hospital Veterinário & Estética em Morro da Fumaça/SC</title>

    content="Clínica veterinária de excelência em Morro da Fumaça. Medicina de ponta, estética especializada e petshop premium. Corpo clínico qualificado, plantão 24h para emergências." />

  <!-- 5. TWITTER CARDS -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PetPoint | Hospital Veterinário & Estética" />
  <meta name="twitter:description" content="Medicina de ponta e cuidado real para seu pet em Morro da Fumaça/SC" />
  <meta name="twitter:image" content="https://www.petpoint.com.br/images/meta/og-image.jpg" />

  <!-- 6. FAVICON -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#CF2E78" />

  <!-- 7. FONTES COM DISPLAY=SWAP - Evita FOIT (Flash of Invisible Text) -->

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,700&display=swap"
    rel="stylesheet">

  <!-- 8. CSS CRÍTICO INLINE - Apenas loading spinner -->
  <style>
    /* Loading spinner inicial */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(207, 46, 120, 0.2);
      border-top-color: #CF2E78;
      border-radius: 50%;
      animation: spin 0.8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>

  <!-- 9. STRUCTURED DATA (JSON-LD) para SEO -->
  <script type="application/ld+json">

  <!-- 10. ANALYTICS - Meta Pixel (Facebook/Instagram) -->
  <script>
    window.requestIdleCallback ?
      requestIdleCallback(initMetaPixel, { timeout: 3000 }) :
      setTimeout(initMetaPixel, 2000);

    function initMetaPixel() {
      !function (f, b, e, v, n, t, s) {
        if (f.fbq) return; n = f.fbq = function () {
          n.callMethod ?
          n.callMethod.apply(n, arguments) : n.queue.push(arguments)
        };
        if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
        n.queue = []; t = b.createElement(e); t.async = !0;
        t.src = v; s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s)
      }(window, document, 'script',
        'https://connect.facebook.net/en_US/fbevents.js');
      // Substitua 'YOUR_PIXEL_ID' pelo seu ID real do Meta Pixel
      // fbq('init', 'YOUR_PIXEL_ID');
      // fbq('track', 'PageView');
    }
  </script>

  <!-- 11. GOOGLE ANALYTICS 4 -->
  <script>
    window.requestIdleCallback ?
      requestIdleCallback(initGA, { timeout: 3000 }) :
      setTimeout(initGA, 2000);

    function initGA() {
      var s = document.createElement('script');
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX';
      s.async = true;
      document.head.appendChild(s);

      window.dataLayer = window.dataLayer || [];

      // gtag('config', 'G-XXXXXXXXXX');
    }
  </script>

</head>

<body class="bg-brand-silver text-brand-gray selection:bg-accent-500 selection:text-white">
  <!-- Loading inicial -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>

  <!-- Script para remover loading quando app carregar -->
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      setTimeout(function () {
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 100);
    });
  </script>
</body>

</html>
